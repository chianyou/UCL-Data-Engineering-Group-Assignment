services:
  - type: web
    name: cyber-risk-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.fastapi_duckdb:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AUTOLOAD_DUCKDB
        value: "1"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.13.2"
